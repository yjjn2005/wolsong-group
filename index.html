<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏦 월송그룹 계좌 통합관리</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
  --border:#2d3748;--text:#e2e8f0;--muted:#718096;
  --primary:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --purple:#8b5cf6;--radius:12px;
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;
}
.header-title{font-size:17px;font-weight:700;white-space:nowrap}
.header-title span{color:var(--primary)}
.header-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rate-box{background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:12px;color:var(--muted)}
.rate-box b{color:var(--yellow)}
.upd{font-size:11px;color:var(--muted)}
.btn{border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s}
.btn-ref{background:var(--primary);color:#fff}.btn-ref:hover{filter:brightness(1.15)}
.btn-ref.spin{opacity:.7;cursor:wait}

/* ── TABS ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── CONTENT ── */
.content{padding:20px;max-width:1300px;margin:0 auto}
.section{display:none}.section.active{display:block}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.c-blue::before{background:var(--primary)}
.card.c-green::before{background:var(--green)}
.card.c-red::before{background:var(--red)}
.card.c-yellow::before{background:var(--yellow)}
.card.c-purple::before{background:var(--purple)}
.clabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.cval{font-size:22px;font-weight:800;color:var(--text)}
.csub{font-size:11px;color:var(--muted);margin-top:3px}
.pos{color:var(--green)!important}.neg{color:var(--red)!important}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface2);padding:10px 12px;text-align:right;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
thead th:first-child{text-align:left}
tbody td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(59,130,246,.05)}
.tot td{font-weight:700;border-top:2px solid var(--border)!important;background:var(--surface2)!important}

/* ── MISC ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.stitle{font-size:15px;font-weight:700}
.stitle small{color:var(--muted);font-size:12px;font-weight:400;margin-left:8px}
.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.pill-live{background:rgba(16,185,129,.15);color:var(--green)}
.pill-load{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge{font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:2px 6px;border-radius:4px;color:var(--muted);display:inline-block;margin-top:2px}
.divider{height:1px;background:var(--border);margin:22px 0}
.warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
.info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);color:#93c5fd;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
.acc-info{font-size:12px;color:var(--muted);margin-bottom:14px;padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}

/* ── SUMMARY BAR CHART (SVG) ── */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:22px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--muted)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;width:100px;text-align:right;flex-shrink:0;color:var(--text)}
.bar-track{flex:1;height:24px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding:0 8px}
.bar-val{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .content{padding:12px}
  .cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .cval{font-size:17px}
  .header-title{font-size:14px}
  .tab{padding:10px 12px;font-size:12px}
}
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════════════

      { name:'SK하이닉스',            ticker:'000660.KS', qty:125,    avgP:2374208,  costKRW:296776000,   cur:'KRW', acct:'신한 160-11-050198' },
      { name:'삼성전자',              ticker:'005930.KS', qty:1000,   avgP:294500,   costKRW:294500000,   cur:'KRW', acct:'신한 160-11-050198' },
      { name:'iShares 20Y 미국채권',   ticker:'TLT',      qty:32956,  avgP:22.52,    costKRW:1146057551,  cur:'USD', acct:'삼성 7134079254' },
      { name:'KODEX 미국30년국채액티브',ticker:'433500.KS', qty:114487, avgP:8731,     costKRW:999675797,   cur:'KRW', acct:'삼성 7137302559' },
      { name:'SK하이닉스',            ticker:'000660.KS', qty:236,    avgP:2517322,  costKRW:594088001,   cur:'KRW', acct:'삼성 7153863849' },
    ],
  },

const ENT_KEYS = ['hankyu','moon','company','tnc'];

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let ST = { prices:{}, rate:null, updated:null, loading:false };

// ══════════════════════════════════════════════════════
//  API — Yahoo Finance v8 chart (개별 종목) + ExchangeRate
//  근거: v7 배치 → Yahoo 503, corsproxy → 401, allorigins → Yahoo 오류 래핑
//  v8 chart API를 종목별로 개별 요청하고 실제 데이터 유효성 검증
// ══════════════════════════════════════════════════════

// AbortController 기반 타임아웃 (AbortSignal.timeout 호환성 문제 회피)
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(tid));
}

// 단일 종목 가격 조회 — v8 chart API + 4개 프록시 + 2개 Yahoo 호스트
async function fetchOneTicker(ticker) {
  const HOSTS = ['query1', 'query2'];
  const PROXY_FNS = [
    u => u,                                                            // 직접
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,        // corsproxy
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,// allorigins
    u => `https://thingproxy.freeboard.io/fetch/${u}`,                // thingproxy
  ];

  for (const host of HOSTS) {
    const base = `https://${host}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d&includePrePost=false`;
    for (const proxyFn of PROXY_FNS) {
      try {
        const r = await fetchWithTimeout(proxyFn(base), 7000);
        if (!r.ok) continue;
        const data = await r.json();
        const meta  = data?.chart?.result?.[0]?.meta;
        const price = meta?.regularMarketPrice;
        const cur   = meta?.currency;
        // 실제 숫자 가격인지 엄격 검증
        if (typeof price === 'number' && price > 0) {
          console.log(`[주가] ${ticker} = ${price} (${cur}) via ${host}`);
          return { price, currency: cur };
        }
      } catch(e) { /* 다음 프록시 시도 */ }
    }
  }
  console.warn(`[주가] ${ticker} 조회 실패 — 모든 프록시 소진`);
  return null;
}

// 전체 종목 병렬 조회
async function fetchPrices() {
  const tickers = [...new Set(ENT_KEYS.flatMap(k => ENT[k].holdings.map(h => h.ticker)))];
  console.log('[주가] 조회 시작:', tickers);
  const settled = await Promise.allSettled(tickers.map(t => fetchOneTicker(t)));
  const out = {};
  settled.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value) out[tickers[i]] = r.value;
  });
  console.log('[주가] 조회 결과:', out);
  return out;
}

async function fetchRate() {
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 7000);
    const r = await fetch('https://open.er-api.com/v6/latest/USD', { signal: ctrl.signal });
    clearTimeout(tid);
    const d = await r.json();
    if (d?.rates?.KRW) { console.log('[환율] USD/KRW =', d.rates.KRW); return d.rates.KRW; }
  } catch(e) {}
  // 폴백: Yahoo Finance USDKRW
  try {
    const r2 = await fetchOneTicker('USDKRW=X');
    if (r2?.price) return r2.price;
  } catch(e) {}
  return null;
}

// ══════════════════════════════════════════════════════
//  CALCULATIONS
// ══════════════════════════════════════════════════════
function calcH(h, prices, rate) {
  const R = rate || 1554.4;
  const pInfo = prices[h.ticker];
  if (!pInfo) return null;
  const p = pInfo.price;
  const valKRW = h.cur === 'KRW' ? p * h.qty : p * h.qty * R;
  return { ...h, liveP: p, valKRW, pnl: valKRW - h.costKRW, pct: (valKRW - h.costKRW) / h.costKRW };
}

function calcE(ek, prices, rate) {
  const e = ENT[ek];
  const R = rate || 1554.4;
  const hs = e.holdings.map(h => calcH(h, prices, rate)).filter(Boolean);
  const secVal  = hs.reduce((s,h) => s + h.valKRW, 0);
  const secCost = hs.reduce((s,h) => s + h.costKRW, 0);
  const usdKRW  = e.usdCash * R;
  const total   = e.krwCash + usdKRW + secVal;
  const pnl     = secVal - secCost;
  return { ...e, hs, secVal, secCost, usdKRW, total, pnl, pct: secCost > 0 ? pnl/secCost : 0 };
}

// ══════════════════════════════════════════════════════
//  FORMAT HELPERS
// ══════════════════════════════════════════════════════
const W = (n,d=0) => n==null ? '-' : Math.round(n).toLocaleString('ko-KR');
function eok(v) {
  if (v==null) return '-';
  const a = Math.abs(v);
  if (a >= 1e12) return (v/1e12).toFixed(2) + '조';
  if (a >= 1e8)  return (v/1e8).toFixed(1) + '억';
  if (a >= 1e4)  return (v/1e4).toFixed(0) + '만';
  return Math.round(v).toLocaleString();
}
const pct  = v => v==null ? '-' : (v*100).toFixed(2)+'%';
const sgn  = v => v>0 ? '+' : '';
const cls  = v => v>0 ? 'pos' : v<0 ? 'neg' : '';
const prc  = (v,c) => v==null ? '-' : c==='USD' ? '$'+v.toFixed(2) : v.toLocaleString('ko-KR')+'원';
const full = v => v==null ? '-' : Math.round(v).toLocaleString('ko-KR')+'원';

// ══════════════════════════════════════════════════════
//  RENDER: DASHBOARD
// ══════════════════════════════════════════════════════
function renderDash() {
  const rate = ST.rate || 1554.4;
  const all  = ENT_KEYS.map(k => calcE(k, ST.prices, rate));
  const has  = Object.keys(ST.prices).length > 0;

  const gTotal  = all.reduce((s,e) => s+e.total, 0);
  const gCash   = all.reduce((s,e) => s+e.krwCash+e.usdKRW, 0);
  const gSec    = all.reduce((s,e) => s+e.secVal, 0);
  const gCost   = all.reduce((s,e) => s+e.secCost, 0);
  const gPnl    = all.reduce((s,e) => s+e.pnl, 0);
  const gPct    = gCost>0 ? gPnl/gCost : 0;

  const maxTotal = Math.max(...all.map(e=>e.total));
  const COLORS   = ['#3b82f6','#10b981','#f59e0b','#8b5cf6'];

  const bars = all.map((e,i) => `
    <div class="bar-row">
      <div class="bar-label">${e.icon} ${e.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(e.total/maxTotal*100).toFixed(1)}%;background:${COLORS[i]}">
          <span class="bar-val">${eok(e.total)}</span>
        </div>
      </div>
      <div style="font-size:11px;width:60px;text-align:right;color:var(--muted)">${pct(e.pct)}</div>
    </div>
  `).join('');

  const entityRows = all.map(e => `
    <tr>
      <td style="font-weight:600">${e.icon} ${e.name}</td>
      <td>${eok(e.total)}</td>
      <td>${eok(e.krwCash + e.usdKRW)}</td>
      <td>${eok(e.secVal)}</td>
      <td>${eok(e.secCost)}</td>
      <td class="${cls(e.pnl)}">${sgn(e.pnl)}${eok(e.pnl)}</td>
      <td class="${cls(e.pct)}">${sgn(e.pct)}${pct(e.pct)}</td>
    </tr>`).join('');

  const allHoldings = all.flatMap((e,i) => e.hs.map(h => ({...h, eName:e.name, eIcon:e.icon, eColor:COLORS[i]})));
  const holdRows = allHoldings.map(h => `
    <tr>
      <td>
        <div style="font-weight:500">${h.name}</div>
        <span class="badge">${h.ticker}</span>
      </td>
      <td style="color:var(--muted);font-size:12px">${h.eIcon} ${h.eName}</td>
      <td>${h.qty.toLocaleString()}</td>
      <td>${prc(h.avgP, h.cur)}</td>

// ══════════════════════════════════════════════════════
//  RENDER: ENTITY
// ══════════════════════════════════════════════════════
function renderEnt(ek) {
  const rate = ST.rate || 1554.4;
  const e    = calcE(ek, ST.prices, rate);
  const has  = Object.keys(ST.prices).length > 0;
  const hasAcct = e.holdings.some(h => h.acct);

  const holdRows = e.hs.map(h => `
    <tr>
      <td>
        <div style="font-weight:500">${h.name}</div>
        <span class="badge">${h.ticker}</span>
      </td>
      ${hasAcct ? `<td style="color:var(--muted);font-size:11px">${h.acct||'-'}</td>` : ''}
      <td>${h.cur}</td>
      <td>${h.qty.toLocaleString()}</td>
      <td>${prc(h.avgP, h.cur)}</td>
      <td style="font-weight:600;color:${e.color}">${prc(h.liveP, h.cur)}</td>
      <td>${eok(h.valKRW)}</td>
      <td>${eok(h.costKRW)}</td>
      <td class="${cls(h.pnl)}">${sgn(h.pnl)}${eok(h.pnl)}</td>
      <td class="${cls(h.pct)}">${sgn(h.pct)}${pct(h.pct)}</td>
    </tr>`).join('');

  const noData = e.hs.length === 0 && has;
  const div = ek==='hankyu'?'c1':ek==='moon'?'c2':ek==='company'?'c3':'c4';

  document.getElementById(div).innerHTML = `
    <div class="sh">
      <div class="stitle">${e.icon} ${e.name} 포트폴리오</div>
      <span class="pill ${has?'pill-live':'pill-load'}">${has?'🟢 실시간':'⚪ 로딩중'}</span>
    </div>

    <div class="cards">
      <div class="card c-blue">
        <div class="clabel">총 평가금액</div>
        <div class="cval">${eok(e.total)}</div>
        <div class="csub">${full(e.total)}</div>
      </div>
      <div class="card c-yellow">
        <div class="clabel">원화 현금 (예수금+CMA)</div>
        <div class="cval">${eok(e.krwCash)}</div>
        <div class="csub">${full(e.krwCash)}</div>
      </div>
      <div class="card c-yellow">
        <div class="clabel">외화현금 (원화환산)</div>
        <div class="cval">${eok(e.usdKRW)}</div>
        <div class="csub">USD ${e.usdCash.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
      </div>
      <div class="card ${e.pnl>=0?'c-green':'c-red'}">
        <div class="clabel">유가증권 평가손익</div>
        <div class="cval ${cls(e.pnl)}">${sgn(e.pnl)}${eok(e.pnl)}</div>
        <div class="csub ${cls(e.pct)}">${sgn(e.pct)}${pct(e.pct)}</div>
      </div>
    </div>

    <div class="acc-info">📋 계좌번호: ${e.accounts.join('&nbsp;&nbsp;|&nbsp;&nbsp;')}</div>

    <div class="sh"><div class="stitle">보유 종목 현황</div></div>
    ${noData ? `<div class="info">ℹ️ 실시간 가격을 불러오는 중입니다...</div>` : ''}
    <div class="tbl-wrap" style="margin-bottom:22px">
      <table>
        <thead><tr>
          <th>종목명</th>
          ${hasAcct?'<th>계좌</th>':''}
          <th>통화</th><th>수량</th><th>평균단가</th>
          <th>현재가(실시간)</th><th>평가금액</th><th>매수금액</th>
          <th>평가손익</th><th>수익률</th>
        </tr></thead>
        <tbody>
          ${holdRows}
          <tr class="tot">
            <td colspan="${hasAcct?4:3}">유가증권 소계</td>
            <td></td><td></td>
            <td>${eok(e.secVal)}</td>
            <td>${eok(e.secCost)}</td>
            <td class="${cls(e.pnl)}">${sgn(e.pnl)}${eok(e.pnl)}</td>
            <td class="${cls(e.pct)}">${sgn(e.pct)}${pct(e.pct)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="divider"></div>
    <div class="sh"><div class="stitle">현금 및 자산 구성</div></div>
    <div class="cards">
      <div class="card">
        <div class="clabel">원화 현금</div>
        <div class="cval" style="font-size:18px">${full(e.krwCash)}</div>
        <div class="csub">CMA + 예수금 합계</div>
      </div>
      <div class="card">
        <div class="clabel">외화 예수금</div>
        <div class="cval" style="font-size:18px">$${e.usdCash.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="csub">≈ ${full(e.usdKRW)}</div>
      </div>
      <div class="card">
        <div class="clabel">유가증권 평가액</div>
        <div class="cval" style="font-size:18px">${full(e.secVal)}</div>
        <div class="csub">취득원가: ${full(e.secCost)}</div>
      </div>
      <div class="card c-blue">
        <div class="clabel">총 자산</div>
        <div class="cval" style="font-size:18px">${full(e.total)}</div>
        <div class="csub">현금 + 유가증권</div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════
//  TAB NAV
// ══════════════════════════════════════════════════════
let curTab = 0;
function showTab(i) {
  curTab = i;
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.section').forEach((s,j) => s.classList.toggle('active', i===j));
  renderCurrent();
}
function renderCurrent() {
  if (curTab === 0) renderDash();
  else renderEnt(ENT_KEYS[curTab-1]);
}

// ══════════════════════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════════════════════
async function refreshAll() {
  if (ST.loading) return;
  ST.loading = true;
  const btn = document.getElementById('btn-ref');
  btn.classList.add('spin'); btn.textContent = '⟳ 로딩중...';

  try {
    const [prices, rate] = await Promise.all([fetchPrices(), fetchRate()]);
    ST.prices  = prices;
    ST.rate    = rate;
    ST.updated = new Date();

    if (rate) {
      document.getElementById('rate-disp').textContent = rate.toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1});
    }
    const t = ST.updated;
    document.getElementById('upd-time').textContent =
      `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')} 업데이트`;

    renderCurrent();
  } catch(e) {
    console.error(e);
    document.getElementById('upd-time').textContent = '연결 실패';
  } finally {
    ST.loading = false;
    btn.classList.remove('spin'); btn.textContent = '⟳ 새로고침';
  }
}

// ── INIT ──
renderDash();            // 초기 렌더 (데이터 없이)
refreshAll();            // 즉시 데이터 로드
setInterval(refreshAll, 60000); // 60초 자동 갱신
</script>
